<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>💭 心事墙 - 情绪树洞</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>

  <!-- 飘落花瓣 -->
  <div class="petals" id="petals"></div>

  <!-- 顶部品牌条 -->
  <header class="top-bar">
    <span class="top-title">🌳 情绪树洞</span>
  </header>

  <div class="container">

    <div class="card" style="text-align: center;">
      <h2>💭 心事墙</h2>
      <p style="font-size: 14px; color: var(--text-secondary); margin-top: 8px;">
        每一份心事，都是一颗需要被温柔对待的心 🌸
      </p>
    </div>

    <div id="postsContainer">
      <div class="loading" id="loading">
        <div class="spinner"></div>
        <p>正在加载心事...</p>
      </div>
    </div>

    <div class="footer">
      🌳 情绪树洞 · 温柔治愈的心事驿站
      <span>愿所有心事，皆有归处 🌸</span>
    </div>
  </div>

  <!-- 回到顶部 -->
  <button class="back-top" id="backTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

  <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
  <script src="/app.js"></script>
  <script>
    // 生成花瓣
    const petals = ['🌸', '🌷', '🌺', '🪷', '✨', '💮'];
    const container = document.getElementById('petals');
    for (let i = 0; i < 6; i++) {
      const el = document.createElement('span');
      el.className = 'petal';
      el.textContent = petals[i % petals.length];
      el.style.left = Math.random() * 100 + '%';
      el.style.fontSize = (14 + Math.random() * 16) + 'px';
      el.style.animationDuration = (8 + Math.random() * 12) + 's';
      el.style.animationDelay = (Math.random() * 15) + 's';
      container.appendChild(el);
    }

    // 加载心事墙
    loadPosts();

    // 回到顶部
    window.addEventListener('scroll', () => {
      document.getElementById('backTop').classList.toggle('show', window.scrollY > 300);
    });
  </script>
  <!-- 底部导航 -->
  <nav class="bottom-nav">
    <a href="/" class="nav-item">
      <span class="nav-icon">🌳</span>
      <span class="nav-label">首页</span>
    </a>
    <a href="/post.html" class="nav-item">
      <span class="nav-icon">📝</span>
      <span class="nav-label">投稿</span>
    </a>
    <a href="/wall.html" class="nav-item active">
      <span class="nav-icon">💭</span>
      <span class="nav-label">心事墙</span>
    </a>
    <a href="/me.html" class="nav-item">
      <span class="nav-icon">👤</span>
      <span class="nav-label">我的</span>
    </a>
  </nav>
</body>
</html>
